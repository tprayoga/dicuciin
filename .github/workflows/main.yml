name: Deploy to VM

on:
  push:
    branches: [ "main" ]
    paths:
      - 'laundry-be/**'
      - 'laundry-admin/**'
      - 'deploy/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: ${{ secrets.VM_PORT }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/dicuciin/dicuciin
            ROOT_DIR=/opt/dicuciin/dicuciin bash deploy/scripts/deploy-update.sh
