version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: laundry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: laundry
      POSTGRES_PASSWORD: laundry_password
      POSTGRES_DB: laundry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laundry-network

  redis:
    image: redis:7-alpine
    container_name: laundry-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laundry-network

  mqtt:
    image: eclipse-mosquitto:2
    container_name: laundry-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - laundry-network

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:

networks:
  laundry-network:
    driver: bridge
